# http seviyesinde tanımlanmalı — /etc/nginx/conf.d/ altına kopyalanır (bkz. deploy/setup.sh)
# Uygulama seviyesindeki rate limit'e (backend/src/api/auth.js) ek bir savunma katmanı:
# Node process yeniden başladığında da IP başına login denemesi sınırlı kalır.
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
