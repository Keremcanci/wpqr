server {
    listen 80;
    server_name DOMAIN_ADI.com;
    # NOT: `certbot --nginx -d DOMAIN_ADI.com` çalıştırıldığında bu dosyaya otomatik
    # olarak `listen 443 ssl;` bloğu ve 80→443 yönlendirmesi eklenir (bkz. deploy/setup.sh).
    # Bu dosyayı certbot'tan SONRA sunucuya yeniden deploy ederken TLS bloğunun
    # elle geri eklendiğinden emin olun, aksi halde HTTPS sessizce kaybolur.

    # Login endpoint — brute-force denemelerine karşı ek nginx seviyesi sınırlama
    location = /api/auth/login {
        limit_req          zone=login_limit burst=5 nodelay;
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
    }

    # Socket.io WebSocket
    location /socket.io/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Yüklenen görseller (backend/uploads) — kampanya/şablon görselleri buradan servis edilir
    location /uploads {
        proxy_pass       http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Next.js frontend
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
